server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flight_catalog
    username: postgres
    password: 3506

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  transfer:
    min-minutes: 30
    max-minutes: 360